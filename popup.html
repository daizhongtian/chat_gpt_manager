<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChatGPT Cleaner & Context Meter</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="popup">
    <header class="popup-header">
      <h1>ChatGPT Cleaner</h1>
      <p>Batch delete and estimate visible context locally.</p>
    </header>

    <section class="section" aria-label="Conversation controls">
      <div class="button-grid">
        <button type="button" id="select-conversations">Select conversations</button>
        <button type="button" id="deselect-all">Deselect all</button>
        <button type="button" id="delete-selected" class="danger">Delete selected</button>
        <button type="button" id="refresh-list">Refresh list</button>
      </div>
      <p class="status" id="conversation-status">Open a ChatGPT tab, then use the controls.</p>
    </section>

    <section class="section" aria-label="Context estimate">
      <label class="toggle-row">
        <input id="context-estimate-enabled" type="checkbox" checked />
        <span>Enable context estimate</span>
      </label>
      <label class="field">
        <span>Context window</span>
        <select id="context-window">
          <option value="16000">16K</option>
          <option value="32000">32K</option>
          <option value="64000">64K</option>
          <option value="128000" selected>128K</option>
          <option value="256000">256K</option>
          <option value="512000">512K</option>
          <option value="1000000">1M</option>
        </select>
      </label>
      <button type="button" id="estimate-context" class="wide">Estimate Context</button>
      <input id="local-pdf-input" class="hidden" type="file" accept="application/pdf,.pdf" multiple />
      <div id="estimate-output" class="estimate-output" aria-live="polite"></div>
    </section>

    <section class="section" aria-label="Usage counter">
      <div class="section-heading">
        <h2>Usage Counter</h2>
        <span id="current-model" class="pill">Model unknown</span>
      </div>
      <div class="button-grid">
        <button type="button" id="refresh-usage">Refresh usage</button>
        <button type="button" id="reset-usage" class="danger">Reset usage</button>
      </div>
      <div id="usage-output" class="usage-output" aria-live="polite"></div>
      <p class="warning">Counts start after the extension is installed and rely on visible ChatGPT UI labels.</p>
    </section>

  </main>

  <script src="vendor/chatgpt-cleaner-tokenizer.js"></script>
  <script src="vendor/chatgpt-cleaner-pdf-analyzer.js"></script>
  <script src="popup.js"></script>
</body>
</html>
